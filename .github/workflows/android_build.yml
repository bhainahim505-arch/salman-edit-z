name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 21 (Capacitor 8 requires Java 21) ────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 3. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses & install tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ── 4. Node + pnpm ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # ── 5. Install dependencies (no frozen lockfile) ──────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 6. Create dist folder (APK uses Live URL — no full Vite build needed)
      - name: Create dist folder for Capacitor sync
        working-directory: artifacts/salman-edit-z
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=https://card.replit.dev"></head><body>Loading...</body></html>' > dist/index.html

      # ── 7. Capacitor: add Android & sync ──────────────────────────────────
      - name: Capacitor — add & sync Android
        working-directory: artifacts/salman-edit-z
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      # ── 8. Patch Android project (Unity Ads + cleartext) ─────────────────
      - name: Patch Android project for Unity Ads
        working-directory: artifacts/salman-edit-z
        continue-on-error: true
        run: |
          chmod +x android-patches/patch-android.sh
          bash android-patches/patch-android.sh

      # ── 9. Gradle permissions ────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/salman-edit-z/android
        run: chmod +x gradlew

      # ── 10. Build Debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: artifacts/salman-edit-z/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 11. Upload APK ────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: salman-edit-z-debug-apk
          path: artifacts/salman-edit-z/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Summary ───────────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## APK Build Complete! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download **salman-edit-z-debug-apk** from Artifacts above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | com.salmanedit.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | https://card.replit.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Unity Ads Game ID | 6067350 |" >> $GITHUB_STEP_SUMMARY
