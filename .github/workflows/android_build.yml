name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 (required for Gradle) ───────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Setup Android SDK ─────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # ── 4. Setup pnpm ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # ── 5. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 6. Build web app ─────────────────────────────────────────────────
      - name: Build web app (Vite)
        working-directory: artifacts/salman-edit-z
        run: pnpm build

      # ── 7. Capacitor: Add Android platform & sync ─────────────────────────
      - name: Capacitor — add Android platform
        working-directory: artifacts/salman-edit-z
        run: |
          npx cap add android || echo "Android platform already exists"
          npx cap sync android

      # ── 8. Patch Android project (Unity Ads + cleartext) ─────────────────
      - name: Patch Android project
        working-directory: artifacts/salman-edit-z
        run: |
          chmod +x android-patches/patch-android.sh
          bash android-patches/patch-android.sh

      # ── 9. Grant Gradle execute permission ───────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/salman-edit-z/android
        run: chmod +x gradlew

      # ── 10. Build Debug APK ───────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: artifacts/salman-edit-z/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 11. Upload APK as GitHub Artifact ─────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: salman-edit-z-debug-apk
          path: artifacts/salman-edit-z/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Print summary ─────────────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## APK Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download your APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App Name | SALMAN EDIT-Z |" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | com.salmanedit.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| Live Update URL | https://card.replit.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Unity Game ID | 6067350 |" >> $GITHUB_STEP_SUMMARY
